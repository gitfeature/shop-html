<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="结算页面 - 确认订单信息">
    <title>结算 - 时尚购物</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="wrapper">
        <!-- #region 顶部导航 -->
        <header class="site-header">
            <div class="container header-inner">
                <a href="index.html" class="logo">时尚购物</a>

                <nav class="main-nav">
                    <a href="index.html">首页</a>
                    <a href="products.html">商品</a>
                    <a href="cart.html" class="active">购物车</a>
                    <a href="user.html">用户中心</a>
                </nav>

                <div class="header-actions">
                    <div class="header-search">
                        <input type="text" placeholder="搜索商品..." id="searchInput">
                    </div>

                    <a href="cart.html" class="header-icon-btn" title="购物车">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"/>
                            <circle cx="20" cy="21" r="1"/>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                        </svg>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>

                    <div class="user-menu" id="userMenu">
                        <a href="login.html" class="btn btn-primary btn-sm" id="loginBtn">登录</a>
                    </div>
                </div>
            </div>
        </header>
        <!-- #endregion -->

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="page-header">
                <div class="container">
                    <h1 class="page-title">确认订单</h1>
                    <div class="page-breadcrumb">
                        <a href="index.html">首页</a>
                        <span>/</span>
                        <a href="cart.html">购物车</a>
                        <span>/</span>
                        <span>确认订单</span>
                    </div>
                </div>
            </div>

            <div class="container">
                <div class="checkout-layout">
                    <div class="checkout-main">
                        <!-- 收货地址 -->
                        <section class="checkout-section">
                            <h2 class="checkout-section-title">收货地址</h2>
                            <div class="address-form">
                                <div class="form-group">
                                    <label class="form-label">收货人</label>
                                    <input type="text" class="form-input" id="receiverName" placeholder="请输入收货人姓名">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">手机号码</label>
                                    <input type="tel" class="form-input" id="receiverPhone" placeholder="请输入手机号码">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">收货地址</label>
                                    <input type="text" class="form-input" id="receiverAddress" placeholder="请输入详细收货地址，如省/市/区/街道/门牌号">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">详细地址</label>
                                    <textarea class="form-input form-textarea" id="addressDetail" placeholder="请输入详细地址"></textarea>
                                </div>
                            </div>
                        </section>

                        <!-- 支付方式 -->
                        <section class="checkout-section">
                            <h2 class="checkout-section-title">支付方式</h2>
                            <div class="payment-methods">
                                <label class="payment-method active">
                                    <input type="radio" name="payment" value="alipay" checked>
                                    <span>支付宝</span>
                                </label>
                                <label class="payment-method">
                                    <input type="radio" name="payment" value="wechat">
                                    <span>微信支付</span>
                                </label>
                                <label class="payment-method">
                                    <input type="radio" name="payment" value="card">
                                    <span>银行卡</span>
                                </label>
                            </div>
                        </section>

                        <!-- 配送方式 -->
                        <section class="checkout-section">
                            <h2 class="checkout-section-title">配送方式</h2>
                            <div class="shipping-methods">
                                <label class="shipping-method active">
                                    <input type="radio" name="shipping" value="standard" checked>
                                    <span>标准配送</span>
                                    <span class="shipping-price">免费</span>
                                </label>
                                <label class="shipping-method">
                                    <input type="radio" name="shipping" value="express">
                                    <span>加急配送</span>
                                    <span class="shipping-price">¥10.00</span>
                                </label>
                            </div>
                        </section>
                    </div>

                    <!-- 订单摘要 -->
                    <aside class="checkout-sidebar">
                        <div class="order-summary">
                            <h3 class="order-summary-title">订单摘要</h3>
                            <div class="order-items" id="orderItems">
                                <!-- 订单商品由 JS 渲染 -->
                            </div>
                            <div class="order-totals">
                                <div class="order-total-row">
                                    <span>商品总价</span>
                                    <span id="subtotal">¥0.00</span>
                                </div>
                                <div class="order-total-row">
                                    <span>运费</span>
                                    <span id="shippingFee">¥0.00</span>
                                </div>
                                <div class="order-total-row total">
                                    <span>应付总额</span>
                                    <span id="totalPrice">¥0.00</span>
                                </div>
                            </div>
                            <button class="btn btn-primary btn-lg btn-block" id="submitOrderBtn">提交订单</button>
                        </div>
                    </aside>
                </div>
            </div>
        </main>

        <!-- #region 页脚 -->
        <footer class="site-footer">
            <div class="container">
                <div class="footer-content">
                    <div class="footer-section">
                        <h4>关于我们</h4>
                        <ul>
                            <li><a href="#">公司介绍</a></li>
                            <li><a href="#">联系方式</a></li>
                            <li><a href="#">人才招聘</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>客户服务</h4>
                        <ul>
                            <li><a href="#">购物指南</a></li>
                            <li><a href="#">配送方式</a></li>
                            <li><a href="#">支付方式</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>帮助中心</h4>
                        <ul>
                            <li><a href="#">常见问题</a></li>
                            <li><a href="#">退换货政策</a></li>
                            <li><a href="#">联系客服</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>关注我们</h4>
                        <ul>
                            <li><a href="#">官方微博</a></li>
                            <li><a href="#">官方微信</a></li>
                            <li><a href="#">RSS 订阅</a></li>
                        </ul>
                    </div>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2024 时尚购物. All rights reserved.</p>
                </div>
            </div>
        </footer>
        <!-- #endregion -->
    </div>

    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
