<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="时尚购物网站，提供优质商品">
    <title>首页 - 时尚购物</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="wrapper">
        <!-- #region 顶部导航 -->
        <header class="site-header">
            <div class="container header-inner">
                <a href="index.html" class="logo">时尚购物</a>

                <nav class="main-nav">
                    <a href="index.html" class="active">首页</a>
                    <a href="products.html">商品</a>
                    <a href="cart.html">购物车</a>
                    <a href="user.html">用户中心</a>
                </nav>

                <div class="header-actions">
                    <div class="header-search">
                        <input type="text" placeholder="搜索商品..." id="searchInput">
                    </div>

                    <a href="cart.html" class="header-icon-btn" title="购物车">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"/>
                            <circle cx="20" cy="21" r="1"/>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                        </svg>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>

                    <div class="user-menu" id="userMenu">
                        <!-- 登录前 -->
                        <a href="login.html" class="btn btn-primary btn-sm" id="loginBtn">登录</a>
                        <!-- 登录后
                        <div class="user-avatar">李</div>
                        <div class="user-dropdown">
                            <a href="user.html">个人中心</a>
                            <a href="user.html#orders">我的订单</a>
                            <a href="#" id="logoutBtn">退出登录</a>
                        </div>
                        -->
                    </div>
                </div>
            </div>
        </header>
        <!-- #endregion -->

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 轮播图 -->
            <section class="hero" id="heroSection"></section>

            <!-- 热门商品 -->
            <section class="featured-products" id="featuredProducts"></section>

            <!-- 品牌专区 -->
            <section class="brand-section" id="brandSection"></section>
        </main>

        <!-- #region 页脚 -->
        <footer class="site-footer">
            <div class="container">
                <div class="footer-content">
                    <div class="footer-section">
                        <h4>关于我们</h4>
                        <ul>
                            <li><a href="#">公司介绍</a></li>
                            <li><a href="#">联系方式</a></li>
                            <li><a href="#">人才招聘</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>客户服务</h4>
                        <ul>
                            <li><a href="#">购物指南</a></li>
                            <li><a href="#">配送方式</a></li>
                            <li><a href="#">支付方式</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>帮助中心</h4>
                        <ul>
                            <li><a href="#">常见问题</a></li>
                            <li><a href="#">退换货政策</a></li>
                            <li><a href="#">联系客服</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>关注我们</h4>
                        <ul>
                            <li><a href="#">官方微博</a></li>
                            <li><a href="#">官方微信</a></li>
                            <li><a href="#">RSS 订阅</a></li>
                        </ul>
                    </div>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2024 时尚购物. All rights reserved.</p>
                </div>
            </div>
        </footer>
        <!-- #endregion -->
    </div>

    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
