<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="登录或注册账号">
    <title>登录 - 时尚购物</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="wrapper">
        <!-- #region 顶部导航 -->
        <header class="site-header">
            <div class="container header-inner">
                <a href="index.html" class="logo">时尚购物</a>

                <nav class="main-nav">
                    <a href="index.html">首页</a>
                    <a href="products.html">商品</a>
                    <a href="cart.html">购物车</a>
                    <a href="user.html">用户中心</a>
                </nav>

                <div class="header-actions">
                    <div class="header-search">
                        <input type="text" placeholder="搜索商品..." id="searchInput">
                    </div>

                    <a href="cart.html" class="header-icon-btn" title="购物车">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"/>
                            <circle cx="20" cy="21" r="1"/>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                        </svg>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>

                    <div class="user-menu" id="userMenu">
                        <a href="login.html" class="btn btn-primary btn-sm" id="loginBtn">登录</a>
                    </div>
                </div>
            </div>
        </header>
        <!-- #endregion -->

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="container">
                <div class="auth-container">
                    <!-- 登录表单 -->
                    <div class="auth-box" id="loginBox">
                        <h2 class="auth-title">登录</h2>
                        <form id="loginForm">
                            <div class="form-group">
                                <label class="form-label">用户名/手机号</label>
                                <input type="text" class="form-input" id="loginUsername" placeholder="请输入用户名或手机号" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">密码</label>
                                <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码" required>
                            </div>
                            <div class="form-group flex justify-between items-center">
                                <label class="flex items-center gap-sm">
                                    <input type="checkbox" id="rememberMe">
                                    <span class="checkbox-label">记住我</span>
                                </label>
                                <a href="#" class="btn-text">忘记密码？</a>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg btn-block">登录</button>
                        </form>
                        <div class="auth-footer">
                            还没有账号？<a href="#" id="showRegister">立即注册</a>
                        </div>
                    </div>

                    <!-- 注册表单 -->
                    <div class="auth-box" id="registerBox" style="display: none;">
                        <h2 class="auth-title">注册</h2>
                        <form id="registerForm">
                            <div class="form-group">
                                <label class="form-label">用户名</label>
                                <input type="text" class="form-input" id="regUsername" placeholder="请输入用户名" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">手机号</label>
                                <input type="tel" class="form-input" id="regPhone" placeholder="请输入手机号" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">密码</label>
                                <input type="password" class="form-input" id="regPassword" placeholder="请输入密码（至少6位）" required minlength="6">
                            </div>
                            <div class="form-group">
                                <label class="form-label">确认密码</label>
                                <input type="password" class="form-input" id="regConfirmPassword" placeholder="请再次输入密码" required>
                            </div>
                            <div class="form-group">
                                <label class="flex items-center gap-sm">
                                    <input type="checkbox" id="agreeTerms" required>
                                    <span class="checkbox-label">我已阅读并同意<a href="#">《用户协议》</a>和<a href="#">《隐私政策》</a></span>
                                </label>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg btn-block">注册</button>
                        </form>
                        <div class="auth-footer">
                            已有账号？<a href="#" id="showLogin">立即登录</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- #region 页脚 -->
        <footer class="site-footer">
            <div class="container">
                <div class="footer-content">
                    <div class="footer-section">
                        <h4>关于我们</h4>
                        <ul>
                            <li><a href="#">公司介绍</a></li>
                            <li><a href="#">联系方式</a></li>
                            <li><a href="#">人才招聘</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>客户服务</h4>
                        <ul>
                            <li><a href="#">购物指南</a></li>
                            <li><a href="#">配送方式</a></li>
                            <li><a href="#">支付方式</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>帮助中心</h4>
                        <ul>
                            <li><a href="#">常见问题</a></li>
                            <li><a href="#">退换货政策</a></li>
                            <li><a href="#">联系客服</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>关注我们</h4>
                        <ul>
                            <li><a href="#">官方微博</a></li>
                            <li><a href="#">官方微信</a></li>
                            <li><a href="#">RSS 订阅</a></li>
                        </ul>
                    </div>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2024 时尚购物. All rights reserved.</p>
                </div>
            </div>
        </footer>
        <!-- #endregion -->
    </div>

    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
