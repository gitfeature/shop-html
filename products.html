<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="浏览全部商品，分类筛选、价格排序">
    <title>商品列表 - 时尚购物</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="wrapper">
        <!-- #region 顶部导航 -->
        <header class="site-header">
            <div class="container header-inner">
                <a href="index.html" class="logo">时尚购物</a>

                <nav class="main-nav">
                    <a href="index.html">首页</a>
                    <a href="products.html" class="active">商品</a>
                    <a href="cart.html">购物车</a>
                    <a href="user.html">用户中心</a>
                </nav>

                <div class="header-actions">
                    <div class="header-search">
                        <input type="text" placeholder="搜索商品..." id="searchInput">
                    </div>

                    <a href="cart.html" class="header-icon-btn" title="购物车">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"/>
                            <circle cx="20" cy="21" r="1"/>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                        </svg>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>

                    <div class="user-menu" id="userMenu">
                        <a href="login.html" class="btn btn-primary btn-sm" id="loginBtn">登录</a>
                    </div>
                </div>
            </div>
        </header>
        <!-- #endregion -->

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="page-header">
                <div class="container">
                    <h1 class="page-title">商品列表</h1>
                    <div class="page-breadcrumb">
                        <a href="index.html">首页</a>
                        <span>/</span>
                        <span>商品</span>
                    </div>
                </div>
            </div>

            <div class="container">
                <div class="products-layout">
                    <!-- 侧边栏筛选 -->
                    <aside class="products-sidebar">
                        <div class="filter-group">
                            <h3 class="filter-title">分类</h3>
                            <ul class="filter-list" id="categoryFilter">
                                <li><a href="#" data-category="all" class="active">全部</a></li>
                                <li><a href="#" data-category="clothing">服装</a></li>
                                <li><a href="#" data-category="shoes">鞋靴</a></li>
                                <li><a href="#" data-category="bags">箱包</a></li>
                                <li><a href="#" data-category="accessories">配饰</a></li>
                            </ul>
                        </div>
                    </aside>

                    <!-- 商品列表 -->
                    <div class="products-main">
                        <div class="products-toolbar">
                            <div class="products-result">
                                共 <span id="resultCount">0</span> 件商品
                            </div>
                            <div class="products-sort">
                                <select id="sortSelect" class="form-input">
                                    <option value="default">默认排序</option>
                                    <option value="price-asc">价格从低到高</option>
                                    <option value="price-desc">价格从高到低</option>
                                    <option value="sales-desc">销量优先</option>
                                </select>
                            </div>
                        </div>

                        <ul class="product-list" id="productList">
                            <!-- 商品列表由 JS 渲染 -->
                        </ul>
                    </div>
                </div>
            </div>
        </main>

        <!-- #region 页脚 -->
        <footer class="site-footer">
            <div class="container">
                <div class="footer-content">
                    <div class="footer-section">
                        <h4>关于我们</h4>
                        <ul>
                            <li><a href="#">公司介绍</a></li>
                            <li><a href="#">联系方式</a></li>
                            <li><a href="#">人才招聘</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>客户服务</h4>
                        <ul>
                            <li><a href="#">购物指南</a></li>
                            <li><a href="#">配送方式</a></li>
                            <li><a href="#">支付方式</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>帮助中心</h4>
                        <ul>
                            <li><a href="#">常见问题</a></li>
                            <li><a href="#">退换货政策</a></li>
                            <li><a href="#">联系客服</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>关注我们</h4>
                        <ul>
                            <li><a href="#">官方微博</a></li>
                            <li><a href="#">官方微信</a></li>
                            <li><a href="#">RSS 订阅</a></li>
                        </ul>
                    </div>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2024 时尚购物. All rights reserved.</p>
                </div>
            </div>
        </footer>
        <!-- #endregion -->
    </div>

    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
