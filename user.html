<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="用户中心 - 管理个人信息、订单历史">
    <title>用户中心 - 时尚购物</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="wrapper">
        <!-- #region 顶部导航 -->
        <header class="site-header">
            <div class="container header-inner">
                <a href="index.html" class="logo">时尚购物</a>

                <nav class="main-nav">
                    <a href="index.html">首页</a>
                    <a href="products.html">商品</a>
                    <a href="cart.html">购物车</a>
                    <a href="user.html" class="active">用户中心</a>
                </nav>

                <div class="header-actions">
                    <div class="header-search">
                        <input type="text" placeholder="搜索商品..." id="searchInput">
                    </div>

                    <a href="cart.html" class="header-icon-btn" title="购物车">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="9" cy="21" r="1"/>
                            <circle cx="20" cy="21" r="1"/>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                        </svg>
                        <span class="cart-count" id="cartCount">0</span>
                    </a>

                    <div class="user-menu" id="userMenu">
                        <a href="login.html" class="btn btn-primary btn-sm" id="loginBtn">登录</a>
                    </div>
                </div>
            </div>
        </header>
        <!-- #endregion -->

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="page-header">
                <div class="container">
                    <h1 class="page-title">用户中心</h1>
                </div>
            </div>

            <div class="container">
                <div class="user-layout" id="userContent">
                    <!-- 未登录状态 -->
                    <div class="user-guest" id="userGuest">
                        <div class="empty-state">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            <h3>请先登录</h3>
                            <p>登录后可查看订单历史和管理收货地址</p>
                            <a href="login.html" class="btn btn-primary">立即登录</a>
                        </div>
                    </div>

                    <!-- 已登录状态 -->
                    <div class="user-dashboard" id="userDashboard" style="display: none;">
                        <div class="user-sidebar">
                            <div class="user-info">
                                <div class="user-avatar-lg" id="userAvatar">李</div>
                                <div class="user-name" id="userName">李小白</div>
                            </div>
                            <nav class="user-nav">
                                <a href="#orders" class="user-nav-item active" data-tab="orders">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                                        <line x1="3" y1="6" x2="21" y2="6"/>
                                        <path d="M16 10a4 4 0 0 1-8 0"/>
                                    </svg>
                                    我的订单
                                </a>
                                <a href="#addresses" class="user-nav-item" data-tab="addresses">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                                        <circle cx="12" cy="10" r="3"/>
                                    </svg>
                                    收货地址
                                </a>
                                <a href="#settings" class="user-nav-item" data-tab="settings">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="3"/>
                                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                                    </svg>
                                    账号设置
                                </a>
                                <a href="#" class="user-nav-item" id="logoutBtn">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                        <polyline points="16 17 21 12 16 7"/>
                                        <line x1="21" y1="12" x2="9" y2="12"/>
                                    </svg>
                                    退出登录
                                </a>
                            </nav>
                        </div>

                        <div class="user-main">
                            <!-- 订单列表 -->
                            <section class="user-section active" id="ordersSection">
                                <h2 class="user-section-title">我的订单</h2>
                                <div class="order-tabs">
                                    <button class="order-tab active" data-status="all">全部</button>
                                    <button class="order-tab" data-status="pending">待支付</button>
                                    <button class="order-tab" data-status="paid">已支付</button>
                                    <button class="order-tab" data-status="shipped">已发货</button>
                                    <button class="order-tab" data-status="completed">已完成</button>
                                </div>
                                <div class="order-list" id="orderList">
                                    <!-- 订单列表由 JS 渲染 -->
                                </div>
                            </section>

                            <!-- 收货地址 -->
                            <section class="user-section" id="addressesSection" style="display: none;">
                                <h2 class="user-section-title">收货地址</h2>
                                <div class="address-list" id="addressList">
                                    <!-- 地址列表由 JS 渲染 -->
                                </div>
                                <button class="btn btn-outline" id="addAddressBtn">新增地址</button>
                            </section>

                            <!-- 账号设置 -->
                            <section class="user-section" id="settingsSection" style="display: none;">
                                <h2 class="user-section-title">账号设置</h2>
                                <form class="settings-form" id="settingsForm">
                                    <div class="form-group">
                                        <label class="form-label">用户名</label>
                                        <input type="text" class="form-input" id="settingsUsername" readonly>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">手机号</label>
                                        <input type="tel" class="form-input" id="settingsPhone">
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">邮箱</label>
                                        <input type="email" class="form-input" id="settingsEmail">
                                    </div>
                                    <button type="submit" class="btn btn-primary">保存修改</button>
                                </form>
                            </section>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- #region 页脚 -->
        <footer class="site-footer">
            <div class="container">
                <div class="footer-content">
                    <div class="footer-section">
                        <h4>关于我们</h4>
                        <ul>
                            <li><a href="#">公司介绍</a></li>
                            <li><a href="#">联系方式</a></li>
                            <li><a href="#">人才招聘</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>客户服务</h4>
                        <ul>
                            <li><a href="#">购物指南</a></li>
                            <li><a href="#">配送方式</a></li>
                            <li><a href="#">支付方式</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>帮助中心</h4>
                        <ul>
                            <li><a href="#">常见问题</a></li>
                            <li><a href="#">退换货政策</a></li>
                            <li><a href="#">联系客服</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>关注我们</h4>
                        <ul>
                            <li><a href="#">官方微博</a></li>
                            <li><a href="#">官方微信</a></li>
                            <li><a href="#">RSS 订阅</a></li>
                        </ul>
                    </div>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2024 时尚购物. All rights reserved.</p>
                </div>
            </div>
        </footer>
        <!-- #endregion -->
    </div>

    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
